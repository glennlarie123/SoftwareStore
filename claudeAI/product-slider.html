<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Slider</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
<style>
  body {
    background: #15171c;
    padding: 40px 20px;
  }

  .card {
    max-width: 540px;
    margin: 0 auto;
    background: #1e2129;
    border: none;
    border-radius: 10px;
    color: #fff;
  }

  .card-header {
    background: transparent;
    border-bottom: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px 4px;
  }

  .card-title {
    font-size: 1.1rem;
    font-weight: 600;
    margin: 0;
    color: #e8e9ec;
  }

  .badge-new {
    background: #e0364f;
    color: #fff;
    border-radius: 14px;
    padding: 5px 14px;
    font-size: 0.85rem;
    font-weight: 600;
  }

  .card-tools .btn {
    color: #9aa0ab;
    background: none;
    border: none;
    font-size: 1.1rem;
    line-height: 1;
    padding: 2px 6px;
  }
  .card-tools .btn:hover { color: #fff; }

  /* ---- Slider track ---- */
  .slider-viewport {
    position: relative;
    padding: 6px 0 18px;
  }

  .slider-track {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    gap: 0;
    padding: 4px 10px 10px;
    -webkit-overflow-scrolling: touch;
    cursor: grab;
  }
  .slider-track.dragging {
    cursor: grabbing;
    scroll-snap-type: none;
    scroll-behavior: auto;
  }
  .slider-track::-webkit-scrollbar { height: 5px; }
  .slider-track::-webkit-scrollbar-thumb {
    background: #3a3f4a;
    border-radius: 3px;
  }
  .slider-track::-webkit-scrollbar-track { background: transparent; }

  .product-item {
    flex: 0 0 25%;
    max-width: 25%;
    scroll-snap-align: start;
    text-align: center;
    padding: 6px 8px;
    user-select: none;
  }

  .product-item img {
    width: 76px;
    height: 76px;
    object-fit: cover;
    border-radius: 50%;
    margin: 0 auto 8px;
    display: block;
    pointer-events: none;
  }

  .product-name {
    display: block;
    font-weight: 600;
    font-size: 0.85rem;
    color: #c7cad1;
    text-decoration: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .product-name:hover { color: #fff; }

  .product-price {
    font-size: 0.8rem;
    font-weight: 600;
    color: #5aa9ff;
    margin-top: 2px;
  }

  /* ---- Nav arrows ---- */
  .slider-nav {
    position: absolute;
    top: 38%;
    transform: translateY(-50%);
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: #2a2e37;
    border: none;
    color: #d6d8dc;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    opacity: 0.9;
    z-index: 2;
  }
  .slider-nav:hover { background: #3a3f4a; color: #fff; }
  .slider-nav.prev { left: -4px; }
  .slider-nav.next { right: -4px; }
  .slider-nav:disabled { opacity: 0.25; pointer-events: none; }

  .card-footer {
    background: transparent;
    border-top: 1px solid #2a2e37;
    text-align: center;
    padding: 10px;
  }
  .card-footer a {
    color: #5aa9ff;
    text-decoration: none;
    font-size: 0.9rem;
  }
  .card-footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <h3 class="card-title">Featured Products</h3>
    <div class="d-flex align-items-center gap-2">
      <span class="badge-new">8 In Stock</span>
      <div class="card-tools">
        <button class="btn" title="Minimize">&minus;</button>
        <button class="btn" title="Close">&times;</button>
      </div>
    </div>
  </div>

  <div class="card-body p-0">
    <div class="slider-viewport">
      <button class="slider-nav prev" aria-label="Previous"><i class="bi bi-chevron-left"></i></button>

      <div class="slider-track" id="sliderTrack">
        <div class="product-item">
          <img src="./assets/img/user1-128x128.jpg" alt="Product image">
          <a class="product-name" href="#">Alexander Pierce</a>
          <div class="product-price">$24.00</div>
        </div>
        <div class="product-item">
          <img src="./assets/img/user1-128x128.jpg" alt="Product image">
          <a class="product-name" href="#">Norman</a>
          <div class="product-price">$18.50</div>
        </div>
        <div class="product-item">
          <img src="./assets/img/user7-128x128.jpg" alt="Product image">
          <a class="product-name" href="#">Jane</a>
          <div class="product-price">$32.00</div>
        </div>
        <div class="product-item">
          <img src="./assets/img/user6-128x128.jpg" alt="Product image">
          <a class="product-name" href="#">John</a>
          <div class="product-price">$15.00</div>
        </div>
        <div class="product-item">
          <img src="./assets/img/user2-160x160.jpg" alt="Product image">
          <a class="product-name" href="#">Alexander</a>
          <div class="product-price">$27.99</div>
        </div>
        <div class="product-item">
          <img src="./assets/img/user5-128x128.jpg" alt="Product image">
          <a class="product-name" href="#">Sarah</a>
          <div class="product-price">$21.30</div>
        </div>
        <div class="product-item">
          <img src="./assets/img/user4-128x128.jpg" alt="Product image">
          <a class="product-name" href="#">Nora</a>
          <div class="product-price">$19.75</div>
        </div>
        <div class="product-item">
          <img src="./assets/img/user3-128x128.jpg" alt="Product image">
          <a class="product-name" href="#">Nadia</a>
          <div class="product-price">$29.00</div>
        </div>
      </div>

      <button class="slider-nav next" aria-label="Next"><i class="bi bi-chevron-right"></i></button>
    </div>
  </div>

  <div class="card-footer">
    <a href="#">View All Products</a>
  </div>
</div>

<script>
(function () {
  const track = document.getElementById('sliderTrack');
  const prevBtn = document.querySelector('.slider-nav.prev');
  const nextBtn = document.querySelector('.slider-nav.next');

  function itemWidth() {
    return track.querySelector('.product-item').getBoundingClientRect().width;
  }

  function updateNavState() {
    const max = track.scrollWidth - track.clientWidth - 1;
    prevBtn.disabled = track.scrollLeft <= 0;
    nextBtn.disabled = track.scrollLeft >= max;
  }

  prevBtn.addEventListener('click', () => {
    track.scrollBy({ left: -itemWidth() * 4, behavior: 'smooth' });
  });
  nextBtn.addEventListener('click', () => {
    track.scrollBy({ left: itemWidth() * 4, behavior: 'smooth' });
  });

  track.addEventListener('scroll', updateNavState);
  window.addEventListener('resize', updateNavState);

  /* drag-to-scroll for mouse users (touch/trackpad swipe works natively) */
  let isDown = false, startX = 0, startScroll = 0;

  track.addEventListener('mousedown', (e) => {
    isDown = true;
    track.classList.add('dragging');
    startX = e.pageX;
    startScroll = track.scrollLeft;
  });

  window.addEventListener('mouseup', () => {
    if (!isDown) return;
    isDown = false;
    track.classList.remove('dragging');
    updateNavState();
  });

  window.addEventListener('mousemove', (e) => {
    if (!isDown) return;
    e.preventDefault();
    track.scrollLeft = startScroll - (e.pageX - startX);
  });

  updateNavState();
})();
</script>

</body>
</html>
