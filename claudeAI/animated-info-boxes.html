<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animated Info Boxes</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
<style>
  body {
    background: #1f2329;
    padding: 40px 20px;
  }

  .info-box {
    display: flex;
    align-items: stretch;
    min-height: 80px;
    background: #2a2f38;
    border-radius: 6px;
    overflow: hidden;
  }

  .info-box-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 70px;
    flex-shrink: 0;
    font-size: 1.6rem;
    border-radius: 0;
  }

  .info-box-content {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 8px 14px;
    color: #fff;
  }

  .info-box-text {
    font-size: 0.85rem;
    color: #c9ccd1;
  }

  .info-box-number {
    font-size: 1.1rem;
    font-weight: 600;
  }

  /* ---- CPU Traffic: gear spins continuously, like a running process ---- */
  .info-box-icon.text-bg-primary i {
    animation: spin 3s linear infinite;
    transform-origin: center;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* ---- Likes: thumbs-up gives a little "tap" pulse, like a like being pressed ---- */
  .info-box-icon.text-bg-danger i {
    animation: likeBeat 2.2s ease-in-out infinite;
    transform-origin: 70% 90%;
  }
  @keyframes likeBeat {
    0%, 100% { transform: scale(1) rotate(0deg); }
    10%      { transform: scale(1.25) rotate(-8deg); }
    20%      { transform: scale(1) rotate(0deg); }
  }

  /* ---- Sales: cart rolls slightly, suggesting motion/delivery ---- */
  .info-box-icon.text-bg-success {
    overflow: hidden;
  }
  .info-box-icon.text-bg-success i {
    display: inline-block;
    animation: cartRoll 2.6s ease-in-out infinite;
  }
  @keyframes cartRoll {
    0%   { transform: translateX(-6px) rotate(0deg); }
    45%  { transform: translateX(6px) rotate(6deg); }
    55%  { transform: translateX(6px) rotate(6deg); }
    100% { transform: translateX(-6px) rotate(0deg); }
  }

  /* ---- New Members: people icon gently pops, like someone just joined ---- */
  .info-box-icon.text-bg-warning i {
    animation: joinPop 2.4s ease-in-out infinite;
  }
  @keyframes joinPop {
    0%, 70%, 100% { transform: scale(1); opacity: 1; }
    80%           { transform: scale(1.3); opacity: 0.7; }
    90%           { transform: scale(1); opacity: 1; }
  }

  @media (prefers-reduced-motion: reduce) {
    .info-box-icon i {
      animation: none !important;
    }
  }
</style>
</head>
<body>
<div class="container">
  <div class="row g-3">

    <div class="col-12 col-sm-6 col-md-3">
      <div class="info-box">
        <span class="info-box-icon text-bg-primary shadow-sm">
          <i class="bi bi-gear-fill"></i>
        </span>
        <div class="info-box-content">
          <span class="info-box-text">CPU Traffic</span>
          <span class="info-box-number">10<small> %</small></span>
        </div>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-md-3">
      <div class="info-box">
        <span class="info-box-icon text-bg-danger shadow-sm">
          <i class="bi bi-hand-thumbs-up-fill"></i>
        </span>
        <div class="info-box-content">
          <span class="info-box-text">Likes</span>
          <span class="info-box-number">41,410</span>
        </div>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-md-3">
      <div class="info-box">
        <span class="info-box-icon text-bg-success shadow-sm">
          <i class="bi bi-cart-fill"></i>
        </span>
        <div class="info-box-content">
          <span class="info-box-text">Sales</span>
          <span class="info-box-number">760</span>
        </div>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-md-3">
      <div class="info-box">
        <span class="info-box-icon text-bg-warning shadow-sm">
          <i class="bi bi-people-fill"></i>
        </span>
        <div class="info-box-content">
          <span class="info-box-text">New Members</span>
          <span class="info-box-number">2,000</span>
        </div>
      </div>
    </div>

  </div>
</div>
</body>
</html>
